# ====================
# コマンドエイリアス
# ====================

set -s command-alias[10] n='new-session -s'
set -s command-alias[11] a='attach-session -t'
set -s command-alias[12] l='list-sessions'
set -s command-alias[13] k='kill-session -t'

# ====================
# 基本設定
# ====================

# True color と 256 色の有効化
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm*:RGB"

# OSC 52 クリップボード連携（SSH 経由でもコピーがローカルに届く）
set -g set-clipboard on

# プレフィックスキーを C-a に変更（Vim の C-b と競合しない）
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Escape キーの遅延をなくす（Vim のモード切替を快適にする）
set -sg escape-time 0

# リピート判定時間
set -g repeat-time 600

# ヒストリの上限
set -g history-limit 50000

# ベルを無効化
set -g bell-action none

# ウィンドウ番号を 1 から開始（0 はキーボード上で遠い）
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じたとき番号を詰め直す
set -g renumber-windows on

# マウス有効化
set -g mouse on

# 24時間表記
set -g clock-mode-style 24

# tmux の入れ子実行時、ステータスラインを赤にして区別
%if #{TMUX}
set -g status-bg red
%endif

# ====================
# vi モード
# ====================

# コピーモードを vi 式にする
setw -g mode-keys vi

# v で選択開始、y でヤンク（Vim と同じ操作感）
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# コピーモードで Escape でキャンセル
bind -T copy-mode-vi Escape send -X cancel

# ====================
# キーバインド
# ====================

# ペイン移動を hjkl で（prefix + h/j/k/l）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（prefix + H/J/K/L でリピート可）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペイン分割（カレントディレクトリを引き継ぐ）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 新規ウィンドウもカレントディレクトリを引き継ぐ
bind c new-window -c "#{pane_current_path}"

# 設定のリロード
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# synchronize-panes の切り替え（全ペインに同時入力）
bind y set synchronize-panes \; display "synchronize-panes #{?synchronize-panes,on,off}"

# ====================
# tokyonight-day テーマ
# ====================

set -g mode-style "fg=#2e7de9,bg=#a8aecb"

set -g message-style "fg=#2e7de9,bg=#a8aecb"
set -g message-command-style "fg=#2e7de9,bg=#a8aecb"

set -g pane-border-style "fg=#a8aecb"
set -g pane-active-border-style "fg=#2e7de9"

set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#2e7de9,bg=#e9e9ec"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#e9e9ed,bg=#2e7de9,bold] #S #[fg=#2e7de9,bg=#e9e9ec,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#a8aecb,bg=#e9e9ec,nobold,nounderscore,noitalics]#[fg=#2e7de9,bg=#a8aecb] %Y-%m-%d  %H:%M #[fg=#2e7de9,bg=#a8aecb,nobold,nounderscore,noitalics]#[fg=#e9e9ed,bg=#2e7de9,bold] #h "

setw -g window-status-activity-style "underscore,fg=#6172b0,bg=#e9e9ec"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#6172b0,bg=#e9e9ec"
setw -g window-status-format "#[fg=#e9e9ec,bg=#e9e9ec,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#e9e9ec,bg=#e9e9ec,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#e9e9ec,bg=#a8aecb,nobold,nounderscore,noitalics]#[fg=#2e7de9,bg=#a8aecb,bold] #I  #W #F #[fg=#a8aecb,bg=#e9e9ec,nobold,nounderscore,noitalics]"
