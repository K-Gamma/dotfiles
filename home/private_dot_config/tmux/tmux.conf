# ====================
# Command aliases
# ====================

set -s command-alias[10] n='new-session -s'
set -s command-alias[11] a='attach-session -t'
set -s command-alias[12] l='list-sessions'
set -s command-alias[13] k='kill-session -t'

# ====================
# General settings
# ====================

# Enable true color (RGB) and 256 colors
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm*:RGB"

# OSC 52 clipboard integration (allows copying to local clipboard over SSH)
set -g set-clipboard on

# Eliminate escape key delay (for faster Vim mode switching)
set -sg escape-time 0

# Time for multiple commands without pressing prefix again
set -g repeat-time 600

# Maximum number of lines held in pane history
set -g history-limit 50000

# Disable bell
set -g bell-action none

# Start window and pane numbering at 1 (0 is too far on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when a window is closed
set -g renumber-windows on

# Enable mouse support
set -g mouse on

# Use 24-hour clock format
set -g clock-mode-style 24

# Red status bar for nested tmux sessions
%if #{TMUX}
set -g status-bg red
%endif

# ====================
# Vi mode
# ====================

# Use vi-style key bindings in copy mode
setw -g mode-keys vi

# v: begin selection, y: copy selection (Vim-like)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Escape to cancel copy mode
bind -T copy-mode-vi Escape send -X cancel

# ====================
# Key bindings
# ====================

# Navigate panes with hjkl (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (prefix + H/J/K/L, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split pane, inheriting current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window inheriting current path
bind c new-window -c "#{pane_current_path}"

# Reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Toggle synchronize-panes (duplicate input to all panes)
bind y set synchronize-panes \; display "synchronize-panes #{?synchronize-panes,on,off}"

# ====================
# tokyonight-day theme
# ====================

set -g mode-style "fg=#2e7de9,bg=#a8aecb"

set -g message-style "fg=#2e7de9,bg=#a8aecb"
set -g message-command-style "fg=#2e7de9,bg=#a8aecb"

set -g pane-border-style "fg=#a8aecb"
set -g pane-active-border-style "fg=#2e7de9"

set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#2e7de9,bg=#e9e9ec"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#e9e9ed,bg=#2e7de9,bold] #S #[fg=#2e7de9,bg=#e9e9ec,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#a8aecb,bg=#e9e9ec,nobold,nounderscore,noitalics]#[fg=#2e7de9,bg=#a8aecb] %Y-%m-%d  %H:%M #[fg=#2e7de9,bg=#a8aecb,nobold,nounderscore,noitalics]#[fg=#e9e9ed,bg=#2e7de9,bold] #h "

setw -g window-status-activity-style "underscore,fg=#6172b0,bg=#e9e9ec"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#6172b0,bg=#e9e9ec"
setw -g window-status-format "#[fg=#e9e9ec,bg=#e9e9ec,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#e9e9ec,bg=#e9e9ec,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#e9e9ec,bg=#a8aecb,nobold,nounderscore,noitalics]#[fg=#2e7de9,bg=#a8aecb,bold] #I  #W #F #[fg=#a8aecb,bg=#e9e9ec,nobold,nounderscore,noitalics]"
